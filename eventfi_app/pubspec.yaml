name: eventfi_app
description: EventFi — Tamil Nadu's Premier Event Booking Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ─── Firebase ────────────────────────────────────────
  firebase_core: ^3.4.0
  firebase_auth: ^5.1.0
  firebase_messaging: ^15.0.0
  google_sign_in: ^6.2.1

  # ─── State Management ────────────────────────────────
  provider: ^6.1.2

  # ─── Navigation ──────────────────────────────────────
  go_router: ^14.2.0

  # ─── Networking ──────────────────────────────────────
  dio: ^5.6.0

  # ─── Fonts & UI ──────────────────────────────────────
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.0
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0

  # ─── Maps ────────────────────────────────────────────
  google_maps_flutter: ^2.7.0

  # ─── QR Code ─────────────────────────────────────────
  qr_flutter: ^4.1.0

  # ─── Payments ────────────────────────────────────────
  razorpay_flutter: ^1.3.6

  # ─── PDF & File ──────────────────────────────────────
  pdf: ^3.11.0
  printing: ^5.13.0
  path_provider: ^2.1.3
  open_file: ^3.5.8

  # ─── Utilities ───────────────────────────────────────
  shared_preferences: ^2.3.1
  image_picker: ^1.1.2
  url_launcher: ^6.3.0
  share_plus: ^10.0.0
  connectivity_plus: ^6.0.3
  intl: ^0.19.0

  # ─── QR Scanner (Admin) ──────────────────────────────
  mobile_scanner: ^5.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: 'assets/images/app_icon.png'

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/fonts/
